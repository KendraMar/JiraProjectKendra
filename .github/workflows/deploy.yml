name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build
        working-directory: dashboard
        env:
          VITE_JIRA_CLOUD_ID: ${{ secrets.VITE_JIRA_CLOUD_ID }}
          VITE_JIRA_EMAIL: ${{ secrets.VITE_JIRA_EMAIL }}
          VITE_JIRA_API_TOKEN: ${{ secrets.VITE_JIRA_API_TOKEN }}
          VITE_JIRA_PROJECT_KEY: ${{ secrets.VITE_JIRA_PROJECT_KEY }}
          VITE_JIRA_COMPONENT: ${{ secrets.VITE_JIRA_COMPONENT }}
          VITE_JIRA_BASE_URL: ${{ secrets.VITE_JIRA_BASE_URL }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
        run: npx vite build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
